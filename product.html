<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Variants - AMA & CO TEXTILE</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="logo.jpg" alt="AMA & CO TEXTILE">
      </div>
      <div class="notification-bell" id="notification-bell">
        <i class="fas fa-bell"></i>
        <span class="notification-badge" id="notification-badge">0</span>
      </div>
      <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="order-status.html">Order Status</a></li>
      </ul>
    </div>
  </header>

  <main>
    <h2 id="product-name-header"></h2>
    <div class="variant-grid" id="variant-grid"></div>
  </main>

  <footer>
    <p>&copy; 2025 AMA & CO TEXTILE LTD. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
  <script>
    // Get product name from URL
    const urlParams = new URLSearchParams(window.location.search);
    const productName = urlParams.get('name');
    document.getElementById('product-name-header').textContent = productName || 'Product';

    // Load variants
    const products = loadProducts();
    const variants = products.filter(p => p.name === productName);
    const container = document.getElementById('variant-grid');
    container.innerHTML = '';

    if (variants.length === 0) {
      container.innerHTML = '<p style="text-align: center; padding: 2rem;">No products found.</p>';
    } else {
      variants.forEach(variant => {
        const images = variant.images || [];
        
        // Create image gallery HTML
        let imagesHtml = '';
        if (images.length > 0) {
          imagesHtml = '<div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; justify-content: center;">';
          images.forEach(img => {
            imagesHtml += `<img src="${img}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #ddd;" onclick="window.open(this.src)" alt="product image" onerror="this.src='https://via.placeholder.com/100?text=Error'">`;
          });
          imagesHtml += '</div>';
        } else {
          imagesHtml = '<p>No images available</p>';
        }

        const card = document.createElement('div');
        card.className = 'variant-card';
        card.innerHTML = `
          <div class="product-info">
            <h3>${variant.name}</h3>
            <p class="product-price">₦${variant.price}</p>
            ${imagesHtml}
            <p>${variant.description || ''}</p>
            <a href="order.html?product=${encodeURIComponent(variant.name)}" class="btn">Order Now</a>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
